<?xml version="1.0" encoding="UTF-8"?>
<!--
  Clawterm canonical mark. Single source for every Clawterm icon,
  favicon, and OG image in the repo. Tracking issue: 501.

  Design: a chevron pointing left, evoking the terminal less-than
  glyph and the brand's agent-aware-terminal identity. Matches the
  existing app icon and favicon. The brand book (docs/brand.md) marks
  logo redesign as a non-goal, so this file preserves the established
  geometry verbatim.

  Colors:
    Background  0c0c0e  matches the app's bg-base CSS token
    Mark        E8364F  the established mark red (predates the
                        color-red error token; preserved for brand
                        continuity)

  Regenerate bitmap assets (PNG plus icns) from this source via the
  commands in docs/brand/README.md. Re-run after any edit.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Clawterm</title>
  <desc id="desc">A left-pointing chevron in brand red on a near-black square. The Clawterm mark.</desc>

  <rect width="512" height="512" fill="#0c0c0e" />

  <path
    d="M183.467 255.905V219.905L327.467 156.496V197.917L228.876 237.496L230.205 235.348V240.462L228.876 238.314L327.467 277.894V319.314L183.467 255.905Z"
    fill="#E8364F"
  />
</svg>
