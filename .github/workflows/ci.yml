name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG" != "$TAURI" ] || [ "$PKG" != "$CARGO" ]; then
            echo "::error::Version mismatch: package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
            exit 1
          fi
          echo "All versions in sync: $PKG"
      # Run frontend checks only (lint, format, test, typecheck) — cargo test
      # is handled by the backend job on its target platform.
      - run: npm run lint && npm run format:check && npm run test && npx tsc --noEmit
      - run: ./scripts/lint-tokens.sh
      - run: ./scripts/lint-name.sh
      - run: npm run build

  backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: aarch64-apple-darwin
      - run: cd src-tauri && cargo clippy --target aarch64-apple-darwin -- -D warnings
      - run: cd src-tauri && cargo test --target aarch64-apple-darwin
