name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Force Node.js 24 for all JavaScript-based actions. Silences the
# deprecation warning from mozilla-actions/sccache-action@v0.0.10
# which still bundles Node.js 20. See #421.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package version $PKG"
      - name: Check version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG" != "$TAURI" ] || [ "$PKG" != "$CARGO" ]; then
            echo "::error::Version mismatch: package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
            exit 1
          fi
          echo "All versions in sync: $PKG"
      # Frontend checks only — cargo test runs as part of each platform build.
      # Using ubuntu-latest saves ~30-60s provisioning vs macos-latest.
      - run: npm run lint && npm run format:check && npm run test && npx tsc --noEmit
      - run: npm run build

  build:
    needs: check
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal-apple-darwin

      - run: npm ci

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between its header and the next ## [...])
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[$VERSION\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Trim leading/trailing blank lines (awk is portable across macOS and Linux)
          NOTES=$(echo "$NOTES" | awk 'NF{p=1} p' | awk '{lines[NR]=$0} END{for(i=NR;i>=1;i--)if(lines[i]!=""){last=i;break} for(i=1;i<=last;i++)print lines[i]}')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "body<<NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history."
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundle
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          # Apple code signing and notarization — uncomment when secrets are configured:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clawterm ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: "--target universal-apple-darwin"

      - name: Generate and upload SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACTS='${{ steps.tauri.outputs.artifactPaths }}'
          CHECKSUM_FILE="checksums-universal-apple-darwin.txt"
          : > "$CHECKSUM_FILE"
          # Process substitution keeps the loop in the parent shell so `set -e`
          # surfaces failures instead of silently exiting a subshell.
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              echo "::warning::Artifact not found, skipping: $file"
              continue
            fi
            name=$(basename "$file")
            hash=$(shasum -a 256 "$file" | awk '{print $1}')
            printf '%s  %s\n' "$hash" "$name" >> "$CHECKSUM_FILE"
          done < <(echo "$ARTIFACTS" | jq -r '.[]')
          if [ -s "$CHECKSUM_FILE" ]; then
            echo "Generated $CHECKSUM_FILE:"
            cat "$CHECKSUM_FILE"
            gh release upload "${{ github.ref_name }}" "$CHECKSUM_FILE" --repo "${{ github.repository }}" --clobber
          else
            echo "::warning::No artifacts hashed — $CHECKSUM_FILE is empty, not uploading"
          fi

  # Publish the draft release after the macOS build completes.
  publish:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
